<!-- เพิ่มโค้ดส่วนนี้ต่อจากเดิมใน admin.html เพื่อดูรายชื่อสมาชิก -->
<div class="bg-white rounded-3xl p-6 shadow-md mt-6">
    <h2 class="font-bold mb-4 flex justify-between text-green-600">
        รายชื่อสมาชิกทั้งหมด
    </h2>
    <div id="user-list" class="space-y-3"></div>
</div>

<script>
    // เพิ่ม Listener นี้ในส่วน Script ของ admin.html
    window.fb.onSnapshot(window.fb.collection(window.db, "users"), (snap) => {
        const list = document.getElementById('user-list');
        list.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            list.innerHTML += `
                <div class="p-3 border rounded-xl text-xs">
                    <p class="font-bold">${data.name} (${data.phone})</p>
                    <p class="text-slate-500">${data.bank} - ${data.acc}</p>
                </div>
            `;
        });
    });
</script>
