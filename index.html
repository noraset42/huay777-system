<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS GC18 - huay777 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration สำหรับโปรเจกต์ huay777-4935b
        const firebaseConfig = {
          apiKey: "AIzaSyA1kBPGS682alisAY_p-h4MaZjFa4L9QcU",
          authDomain: "huay777-4935b.firebaseapp.com",
          projectId: "huay777-4935b",
          storageBucket: "huay777-4935b.firebasestorage.app",
          messagingSenderId: "202558801938",
          appId: "1:202558801938:web:180872ca68864c6065f0cb",
          measurementId: "G-ZMQZX6SYLC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.db = db;
        window.fb = { collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy };
    </script>

    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <!-- Header -->
        <header class="bg-slate-900 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-50">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-slate-900">N</div>
                    <div>
                        <p class="text-[10px] opacity-60">ยินดีต้อนรับ</p>
                        <h1 class="text-sm font-bold">นรเศรษฐ์ โพธิ์ศรี</h1>
                    </div>
                </div>
                <button onclick="toggleAdmin()" id="admin-badge" class="bg-slate-800 border border-yellow-500/50 text-yellow-500 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">
                    Admin Mode
                </button>
            </div>
            <div class="bg-gradient-to-r from-yellow-400 to-yellow-600 p-5 rounded-3xl text-slate-900 shadow-inner">
                <p class="text-[10px] font-bold opacity-80 uppercase">Credit Balance</p>
                <h2 class="text-3xl font-black">1,500.00 <span class="text-sm">฿</span></h2>
            </div>
        </header>

        <!-- Home: Lotto Selection -->
        <main id="home-page" class="tab-content active p-6">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="layout-grid" class="w-5 h-5 text-yellow-600"></i>
                <h2 class="font-bold text-slate-800">เลือกประเภทหวย</h2>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="alert('เปิดระบบหวยรัฐบาล')" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-md transition active:scale-95 flex flex-col items-center">
                    <img src="https://flagcdn.com/w80/th.png" class="w-10 h-7 object-cover rounded-md mb-2 shadow-sm">
                    <span class="font-bold text-xs text-slate-700">รัฐบาลไทย</span>
                </button>
                <button onclick="alert('เปิดระบบหวยฮานอย')" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-md transition active:scale-95 flex flex-col items-center">
                    <img src="https://flagcdn.com/w80/vn.png" class="w-10 h-7 object-cover rounded-md mb-2 shadow-sm">
                    <span class="font-bold text-xs text-slate-700">ฮานอย</span>
                </button>
                <button onclick="alert('เปิดระบบหวยลาว')" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-md transition active:scale-95 flex flex-col items-center">
                    <img src="https://flagcdn.com/w80/la.png" class="w-10 h-7 object-cover rounded-md mb-2 shadow-sm">
                    <span class="font-bold text-xs text-slate-700">ลาวพัฒนา</span>
                </button>
                <button onclick="alert('เปิดระบบยี่กี')" class="bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm hover:shadow-md transition active:scale-95 flex flex-col items-center">
                    <div class="w-10 h-10 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-1"><i data-lucide="dices"></i></div>
                    <span class="font-bold text-xs text-slate-700">จับยี่กี</span>
                </button>
            </div>
        </main>

        <!-- Finance: Deposit/Withdraw -->
        <div id="finance-page" class="tab-content p-6">
            <div class="flex items-center gap-2 mb-6">
                <i data-lucide="wallet-2" class="w-6 h-6 text-blue-600"></i>
                <h2 class="text-xl font-bold">แจ้งฝาก-ถอนเงิน</h2>
            </div>
            <div class="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-200 shadow-inner">
                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">ประเภทรายการ</label>
                <select id="trans-type" class="w-full p-4 bg-white border border-slate-200 rounded-2xl mt-1 mb-4 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="deposit">ฝากเงิน (Deposit)</option>
                    <option value="withdraw">ถอนเงิน (Withdraw)</option>
                </select>

                <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">ระบุจำนวนเงิน</label>
                <input type="number" id="trans-amount" class="w-full p-5 bg-white border border-slate-200 rounded-2xl mt-1 text-3xl font-black text-center text-slate-800" placeholder="0.00">
                
                <p class="text-[10px] text-center text-slate-400 mt-6 px-4 italic leading-relaxed">
                    * เมื่อกดส่งข้อมูล รายการจะถูกส่งไปยังแอดมินทันที กรุณารอการตรวจสอบไม่เกิน 5-10 นาที
                </p>
                
                <button onclick="submitFinance()" class="w-full bg-slate-900 text-white mt-6 p-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all">
                    ยืนยันรายการ
                </button>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-page" class="tab-content p-6 pb-24">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-red-600 flex items-center gap-2">
                    <i data-lucide="shield-check"></i> รายการรออนุมัติ
                </h2>
                <span id="pending-count" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold">0</span>
            </div>
            <div id="admin-list" class="space-y-4">
                <!-- Data from Firebase -->
            </div>
        </div>

        <!-- Footer Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass border-t border-gray-100 flex justify-around p-4 z-50 rounded-t-3xl shadow-2xl">
            <button onclick="showTab('home-page')" class="flex flex-col items-center group">
                <i data-lucide="home" class="text-slate-400 group-hover:text-slate-900 transition-colors"></i>
                <span class="text-[9px] font-bold text-slate-400 group-hover:text-slate-900 uppercase mt-1">หน้าหลัก</span>
            </button>
            <button onclick="showTab('finance-page')" class="flex flex-col items-center group">
                <div class="p-3 bg-slate-900 rounded-2xl -mt-10 shadow-lg group-hover:bg-yellow-500 transition-all">
                    <i data-lucide="plus" class="text-white group-hover:text-slate-900"></i>
                </div>
                <span class="text-[9px] font-bold text-slate-400 group-hover:text-slate-900 uppercase mt-1">แจ้งยอด</span>
            </button>
            <button class="flex flex-col items-center group">
                <i data-lucide="user" class="text-slate-400 group-hover:text-slate-900 transition-colors"></i>
                <span class="text-[9px] font-bold text-slate-400 group-hover:text-slate-900 uppercase mt-1">โปรไฟล์</span>
            </button>
        </nav>

    </div>

    <script>
        lucide.createIcons();

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // แจ้งฝาก-ถอน (User)
        async function submitFinance() {
            const type = document.getElementById('trans-type').value;
            const amount = document.getElementById('trans-amount').value;

            if(!amount || amount <= 0) return alert('กรุณาระบุจำนวนเงิน');

            try {
                await window.fb.addDoc(window.fb.collection(window.db, "transactions"), {
                    user: "นรเศรษฐ์ โพธิ์ศรี",
                    type: type,
                    amount: parseFloat(amount),
                    status: "pending",
                    timestamp: new Date()
                });

                alert('ส่งข้อมูลสำเร็จ! กรุณารอแอดมินอนุมัติ');
                document.getElementById('trans-amount').value = '';
                showTab('home-page');
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // ระบบแอดมิน (Real-time Approval)
        let isAdminActive = false;
        function toggleAdmin() {
            isAdminActive = !isAdminActive;
            const badge = document.getElementById('admin-badge');
            if(isAdminActive) {
                badge.classList.replace('text-yellow-500', 'text-white');
                badge.classList.add('bg-red-600');
                showTab('admin-page');
                listenToTransactions();
            } else {
                badge.classList.replace('text-white', 'text-yellow-500');
                badge.classList.remove('bg-red-600');
                showTab('home-page');
            }
        }

        function listenToTransactions() {
            const q = window.fb.query(window.fb.collection(window.db, "transactions"), window.fb.orderBy("timestamp", "desc"));
            
            window.fb.onSnapshot(q, (snapshot) => {
                const container = document.getElementById('admin-list');
                const countBadge = document.getElementById('pending-count');
                container.innerHTML = '';
                let pendingCount = 0;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    if(data.status === 'pending') pendingCount++;

                    const div = document.createElement('div');
                    div.className = `p-5 rounded-[2rem] border-2 shadow-sm ${data.status === 'pending' ? 'bg-white border-yellow-400' : 'bg-gray-50 border-gray-100 opacity-60'}`;
                    div.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-[10px] font-bold px-3 py-1 rounded-full uppercase ${data.type === 'deposit' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">${data.type}</span>
                                <h3 class="text-xl font-black mt-2 text-slate-800">${data.amount.toLocaleString()} ฿</h3>
                                <p class="text-[10px] text-slate-400">ผู้แจ้ง: ${data.user}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                ${data.status === 'pending' ? `
                                    <button onclick="processApprove('${id}', 'success')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-green-600 shadow-md">อนุมัติ</button>
                                    <button onclick="processApprove('${id}', 'rejected')" class="bg-slate-200 text-slate-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition-all">ยกเลิก</button>
                                ` : `<span class="text-xs font-bold uppercase ${data.status === 'success' ? 'text-green-600' : 'text-red-600'}">${data.status}</span>`}
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
                countBadge.innerText = pendingCount;
                lucide.createIcons();
            });
        }

        async function processApprove(id, status) {
            if(!confirm(`ยืนยันการทำรายการนี้ใช่หรือไม่?`)) return;
            try {
                await window.fb.updateDoc(window.fb.doc(window.db, "transactions", id), { status: status });
            } catch (e) {
                alert('Update Error: ' + e.message);
            }
        }
    </script>
</body>
</html>
