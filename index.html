<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUAY777 - Premium System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, onSnapshot, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyA1kBPGS682alisAY_p-h4MaZjFa4L9QcU",
          authDomain: "huay777-4935b.firebaseapp.com",
          projectId: "huay777-4935b",
          storageBucket: "huay777-4935b.firebasestorage.app",
          appId: "1:202558801938:web:180872ca68864c6065f0cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; 
        window.fb = { collection, addDoc, getDocs, query, where, serverTimestamp, onSnapshot, orderBy, doc, updateDoc };
    </script>

    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { transition: all 0.2s; }
        input:focus { border-color: #eab308 !important; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col">

    <!-- 1. หน้า Login -->
    <div id="login-page" class="page active p-8 pt-20">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-slate-900 tracking-tighter">HUAY<span class="text-yellow-500">777</span></h1>
            <p class="text-slate-400 text-sm mt-2">ระบบจัดการหวยและสมาชิกออนไลน์</p>
        </div>
        <div class="space-y-4">
            <div class="relative">
                <i data-lucide="phone" class="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                <input type="text" id="login-phone" placeholder="เบอร์โทรศัพท์" class="w-full p-4 pl-12 bg-slate-50 border rounded-2xl outline-none">
            </div>
            <div class="relative">
                <i data-lucide="lock" class="absolute left-4 top-4 w-5 h-5 text-slate-400"></i>
                <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="w-full p-4 pl-12 bg-slate-50 border rounded-2xl outline-none">
            </div>
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-slate-800 active:scale-95 transition">เข้าสู่ระบบ</button>
            <button onclick="showPage('reg-page')" class="w-full text-slate-500 text-sm font-bold py-2">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</button>
        </div>
    </div>

    <!-- 2. หน้าสมัครสมาชิก -->
    <div id="reg-page" class="page p-8">
        <div class="flex items-center gap-2 mb-6">
            <button onclick="showPage('login-page')" class="p-2 bg-slate-100 rounded-full"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <h2 class="text-2xl font-bold">สมัครสมาชิก</h2>
        </div>
        <div class="space-y-3">
            <input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
            <input type="text" id="reg-phone" placeholder="เบอร์โทรศัพท์ (ใช้เข้าระบบ)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
            <div class="grid grid-cols-2 gap-2">
                <select id="reg-bank" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm">
                    <option value="">เลือกธนาคาร</option>
                    <option value="กสิกรไทย">กสิกรไทย</option>
                    <option value="ไทยพาณิชย์">ไทยพาณิชย์</option>
                    <option value="กรุงเทพ">กรุงเทพ</option>
                    <option value="กรุงไทย">กรุงไทย</option>
                </select>
                <input type="text" id="reg-acc" placeholder="เลขบัญชี" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
            </div>
            <input type="password" id="reg-pass" placeholder="กำหนดรหัสผ่าน" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
            <button id="btn-reg" onclick="handleRegister()" class="w-full bg-yellow-500 text-slate-900 p-4 rounded-2xl font-bold shadow-lg mt-4 active:scale-95 transition">ยืนยันการสมัคร</button>
        </div>
    </div>

    <!-- 3. หน้าสำหรับ User -->
    <div id="user-page" class="page h-full">
        <header class="bg-slate-900 text-white p-6 rounded-b-[2.5rem] shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center font-bold text-slate-900 text-xl shadow-inner" id="user-initial">U</div>
                    <div>
                        <p class="text-[10px] opacity-60 uppercase tracking-widest">Member</p>
                        <h1 class="text-base font-bold" id="user-display-name">...</h1>
                    </div>
                </div>
                <button onclick="location.reload()" class="p-2 bg-slate-800 rounded-xl text-slate-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
            <div class="bg-gradient-to-br from-yellow-400 to-yellow-600 p-6 rounded-[2rem] text-slate-900 shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-70 uppercase">Available Balance</p>
                    <h2 class="text-4xl font-black">0.00 <span class="text-sm">฿</span></h2>
                </div>
                <i data-lucide="wallet" class="absolute right-[-10px] bottom-[-10px] w-24 h-24 opacity-20"></i>
            </div>
        </header>
        <div class="p-8 text-center space-y-4">
            <div class="py-10 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
                <i data-lucide="lock" class="mx-auto mb-3 text-slate-300 w-10 h-10"></i>
                <p class="text-slate-500 font-bold">ระบบแทงหวยจะเปิดเร็วๆ นี้</p>
                <p class="text-[10px] text-slate-400 px-10">ขณะนี้แอดมินกำลังปรับปรุงระบบรับยอดให้มีความเสถียรสูงสุด</p>
            </div>
        </div>
    </div>

    <!-- 4. หน้าสำหรับ แอดมิน -->
    <div id="admin-page" class="page min-h-screen bg-slate-50 p-6">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black text-slate-900">ADMIN <span class="text-red-600">PANEL</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">WMS GC18 System v2</p>
            </div>
            <button onclick="location.reload()" class="p-3 bg-white shadow-sm rounded-2xl text-slate-400"><i data-lucide="power" class="w-6 h-6"></i></button>
        </div>
        
        <div class="grid gap-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="arrow-up-right" class="text-green-500 w-5 h-5"></i>
                    <h2 class="font-bold text-slate-700">รายการฝาก-ถอน</h2>
                </div>
                <div id="admin-money-list" class="space-y-3">
                    <p class="text-center text-xs text-slate-300 py-4">ไม่มีรายการใหม่</p>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="users" class="text-blue-500 w-5 h-5"></i>
                    <h2 class="font-bold text-slate-700">สมาชิกทั้งหมด</h2>
                </div>
                <div id="admin-user-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        // *** ตั้งค่าเบอร์แอดมินที่นี่ ***
        const ADMIN_PHONE = "0651063435"; 
        
        let currentUser = null;
        lucide.createIcons();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;

            if(!phone || !pass) return alert('กรุณากรอกข้อมูลให้ครบ');

            try {
                const q = window.fb.query(window.fb.collection(window.db, "users"), 
                    window.fb.where("phone", "==", phone), 
                    window.fb.where("pass", "==", pass)
                );

                const snap = await window.fb.getDocs(q);
                if (!snap.empty) {
                    currentUser = snap.docs[0].data();
                    if(phone === ADMIN_PHONE) {
                        showPage('admin-page');
                        loadAdminData();
                    } else {
                        document.getElementById('user-display-name').innerText = currentUser.name;
                        document.getElementById('user-initial').innerText = currentUser.name[0];
                        showPage('user-page');
                    }
                } else {
                    alert('เบอร์โทรศัพท์หรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (e) { alert('เชื่อมต่อฐานข้อมูลไม่ได้: ' + e.message); }
        }

        async function handleRegister() {
            const btn = document.getElementById('btn-reg');
            const user = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                bank: document.getElementById('reg-bank').value,
                acc: document.getElementById('reg-acc').value,
                pass: document.getElementById('reg-pass').value
            };

            if(!user.phone || !user.pass || !user.name) return alert('กรุณากรอกข้อมูลสำคัญให้ครบ');
            
            btn.disabled = true;
            btn.innerText = "กำลังลงทะเบียน...";

            try {
                await window.fb.addDoc(window.fb.collection(window.db, "users"), { 
                    ...user, 
                    balance: 0,
                    timestamp: window.fb.serverTimestamp() 
                });
                alert('สมัครสมาชิกสำเร็จ! เข้าสู่ระบบได้เลย');
                showPage('login-page');
            } catch (e) { 
                alert('สมัครไม่ได้: ' + e.message); 
            } finally {
                btn.disabled = false;
                btn.innerText = "ยืนยันการสมัคร";
            }
        }

        function loadAdminData() {
            // ดึงรายการเงินสด
            window.fb.onSnapshot(window.fb.query(window.fb.collection(window.db, "transactions"), window.fb.orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('admin-money-list');
                list.innerHTML = snap.empty ? '<p class="text-center text-xs text-slate-300 py-4">ไม่มีรายการใหม่</p>' : '';
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="p-4 bg-slate-50 border rounded-2xl flex justify-between items-center transition hover:bg-white">
                            <div>
                                <p class="font-black text-slate-800">${data.amount.toLocaleString()} ฿</p>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">${data.user} | ${data.type}</p>
                            </div>
                            ${data.status === 'pending' ? 
                                `<button onclick="approve('${d.id}')" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold shadow-sm">อนุมัติ</button>` : 
                                `<span class="text-[10px] font-black text-green-500 italic">SUCCESS</span>`}
                        </div>`;
                });
            });

            // ดึงรายชื่อสมาชิก
            window.fb.onSnapshot(window.fb.collection(window.db, "users"), (snap) => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `
                        <div class="p-3 bg-white border border-slate-100 rounded-2xl text-xs flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center font-bold">${data.name[0]}</div>
                                <div>
                                    <p class="font-bold">${data.name}</p>
                                    <p class="text-slate-400 text-[9px]">${data.phone}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-slate-700">${data.bank}</p>
                                <p class="text-[9px] text-slate-400">${data.acc}</p>
                            </div>
                        </div>`;
                });
            });
        }

        async function approve(id) {
            if(confirm('ยืนยันรายการนี้ใช่หรือไม่?')) {
                await window.fb.updateDoc(window.fb.doc(window.db, "transactions", id), { status: "success" });
            }
        }
    </script>
</body>
</html>
