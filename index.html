<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUAY777 - Complete System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- โหลด Firebase แบบ Compatibility Mode เพื่อความเสถียรสูงสุดบนหน้าเว็บเดียว -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .huay-card { transition: all 0.2s; border: 2px solid transparent; }
        .huay-card.selected { border-color: #eab308; background-color: #fefce8; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col relative">

    <!-- ส่วน Login -->
    <div id="login-page" class="page active p-8 pt-16">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black text-slate-900">HUAY<span class="text-yellow-500">777</span></h1>
            <p class="text-slate-400 text-sm">ระบบแทงหวยออนไลน์ครบวงจร</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="login-phone" placeholder="เบอร์โทรศัพท์" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-yellow-500/20">
            <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 ring-yellow-500/20">
            <button onclick="handleLogin()" id="btn-login" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">เข้าสู่ระบบ</button>
            <button onclick="showPage('reg-page')" class="w-full text-slate-500 text-sm py-2">สมัครสมาชิกใหม่</button>
        </div>
    </div>

    <!-- ส่วน Register -->
    <div id="reg-page" class="page p-8">
        <h2 class="text-2xl font-bold mb-6">สมัครสมาชิก</h2>
        <div class="space-y-3">
            <input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล" class="w-full p-4 bg-slate-50 border rounded-2xl">
            <input type="text" id="reg-phone" placeholder="เบอร์โทรศัพท์" class="w-full p-4 bg-slate-50 border rounded-2xl">
            <select id="reg-bank" class="w-full p-4 bg-slate-50 border rounded-2xl">
                <option value="">เลือกธนาคาร</option>
                <option value="กสิกร">กสิกร</option>
                <option value="ไทยพาณิชย์">ไทยพาณิชย์</option>
                <option value="กรุงไทย">กรุงไทย</option>
            </select>
            <input type="text" id="reg-acc" placeholder="เลขบัญชี" class="w-full p-4 bg-slate-50 border rounded-2xl">
            <input type="password" id="reg-pass" placeholder="ตั้งรหัสผ่าน" class="w-full p-4 bg-slate-50 border rounded-2xl">
            <button onclick="handleRegister()" id="btn-reg" class="w-full bg-yellow-500 text-slate-900 p-4 rounded-2xl font-bold mt-4 shadow-lg active:scale-95 transition">ยืนยันการสมัคร</button>
            <button onclick="showPage('login-page')" class="w-full text-slate-400 text-sm">ย้อนกลับ</button>
        </div>
    </div>

    <!-- ส่วน User Dashboard -->
    <div id="user-page" class="page h-full pb-24">
        <div class="bg-slate-900 text-white p-6 rounded-b-[2rem] shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <span id="user-display-name" class="font-bold text-yellow-500">...</span>
                <button onclick="location.reload()" class="text-slate-400 text-xs uppercase font-bold">ออกจากระบบ</button>
            </div>
            <div class="bg-white/10 p-5 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] opacity-60">ยอดเงินคงเหลือ</p>
                    <h2 class="text-3xl font-black text-yellow-400"><span id="user-balance">0.00</span> ฿</h2>
                </div>
                <div class="flex gap-2">
                    <button onclick="openMoneyModal('deposit')" class="bg-green-500 p-2 px-4 rounded-xl text-xs font-bold">ฝาก</button>
                    <button onclick="openMoneyModal('withdraw')" class="bg-red-500 p-2 px-4 rounded-xl text-xs font-bold">ถอน</button>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">เลือกแทงเลข (2 ตัว)</h3>
                <span class="text-[10px] text-slate-400">อัตราจ่าย 90/1</span>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <input type="number" id="lottery-num" placeholder="00-99" class="p-4 bg-slate-50 border rounded-2xl text-center text-2xl font-bold focus:border-yellow-500 outline-none">
                <input type="number" id="lottery-amount" placeholder="จำนวนเงิน" class="p-4 bg-slate-50 border rounded-2xl text-center text-xl outline-none">
            </div>
            <button onclick="placeBet()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="send" class="w-4 h-4 text-yellow-500"></i> ยืนยันการส่งโพย
            </button>

            <div class="mt-8">
                <h3 class="font-bold mb-3 flex items-center gap-2"><i data-lucide="history" class="w-4 h-4"></i> ประวัติการแทง</h3>
                <div id="bet-history" class="space-y-2 text-sm">
                    <p class="text-center text-slate-300 py-4">ไม่มีข้อมูล</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ส่วน Admin Panel -->
    <div id="admin-page" class="page bg-slate-50 min-h-screen p-6 pb-10">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black">ADMIN <span class="text-red-500">CENTER</span></h1>
            <button onclick="location.reload()" class="bg-white p-2 rounded-lg shadow-sm text-slate-400"><i data-lucide="power" class="w-5 h-5"></i></button>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border">
                <h2 class="font-bold text-sm mb-4 flex items-center gap-2 text-green-600"><i data-lucide="wallet" class="w-4 h-4"></i> คำขอ ฝาก-ถอน</h2>
                <div id="admin-money-list" class="space-y-2"></div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border">
                <h2 class="font-bold text-sm mb-4 flex items-center gap-2 text-blue-600"><i data-lucide="list" class="w-4 h-4"></i> รายการแทงวันนี้</h2>
                <div id="admin-bet-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- Modal ฝาก-ถอน -->
    <div id="money-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white w-full rounded-[2rem] p-8 space-y-4 shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold text-center uppercase tracking-tighter">แจ้งยอด</h2>
            <div class="bg-slate-50 p-4 rounded-2xl border text-center">
                <p class="text-[10px] text-slate-400">ระบุจำนวนเงินที่ต้องการ</p>
                <input type="number" id="money-amount" placeholder="0.00" class="bg-transparent text-3xl font-black w-full text-center outline-none py-2">
            </div>
            <div class="flex gap-2">
                <button onclick="closeMoneyModal()" class="flex-1 p-4 text-slate-400 font-bold">ยกเลิก</button>
                <button onclick="submitTransaction()" class="flex-[2] bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg">ยืนยันแจ้งยอด</button>
            </div>
        </div>
    </div>

    <script>
        // --- ส่วนตั้งค่า Firebase และแอดมิน ---
        const ADMIN_PHONE = "0800000000"; // <--- เปลี่ยนเป็นเบอร์แอดมินตรงนี้

        const firebaseConfig = {
            apiKey: "AIzaSyA1kBPGS682alisAY_p-h4MaZjFa4L9QcU",
            authDomain: "huay777-4935b.firebaseapp.com",
            projectId: "huay777-4935b",
            storageBucket: "huay777-4935b.firebasestorage.app",
            appId: "1:202558801938:web:180872ca68864c6065f0cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentUser = null;
        let transType = '';

        // --- ฟังก์ชันนำทาง ---
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            lucide.createIcons();
        }

        // --- ระบบ Login / Register ---
        async function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            const btn = document.getElementById('btn-login');

            if(!phone || !pass) return alert('กรุณากรอกข้อมูลให้ครบ');
            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;

            try {
                const snap = await db.collection("users").where("phone", "==", phone).where("pass", "==", pass).get();
                if (!snap.empty) {
                    currentUser = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    if(phone === ADMIN_PHONE) {
                        showPage('admin-page');
                        loadAdminData();
                    } else {
                        startUserSync();
                        showPage('user-page');
                    }
                } else {
                    alert('เบอร์หรือรหัสผ่านไม่ถูกต้อง');
                }
            } catch (e) { alert('Error: ' + e.message); }
            btn.innerText = "เข้าสู่ระบบ";
            btn.disabled = false;
        }

        async function handleRegister() {
            const btn = document.getElementById('btn-reg');
            const user = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                bank: document.getElementById('reg-bank').value,
                acc: document.getElementById('reg-acc').value,
                pass: document.getElementById('reg-pass').value,
                balance: 0,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if(!user.phone || !user.pass || !user.name) return alert('กรุณากรอกข้อมูลให้ครบ');
            btn.innerText = "กำลังสมัคร...";
            btn.disabled = true;

            try {
                await db.collection("users").add(user);
                alert('สมัครสำเร็จ!');
                showPage('login-page');
            } catch (e) { alert('Error: ' + e.message); }
            btn.innerText = "ยืนยันการสมัคร";
            btn.disabled = false;
        }

        // --- ระบบ User (Real-time Sync) ---
        function startUserSync() {
            db.collection("users").doc(currentUser.id).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('user-display-name').innerText = "คุณ " + data.name;
                    document.getElementById('user-balance').innerText = data.balance.toLocaleString(undefined, {minimumFractionDigits: 2});
                    currentUser.balance = data.balance;
                }
            });

            db.collection("bets").where("phone", "==", currentUser.phone).orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('bet-history');
                list.innerHTML = snap.empty ? '<p class="text-center text-slate-300 py-4">ไม่มีข้อมูล</p>' : '';
                snap.forEach(d => {
                    const b = d.data();
                    list.innerHTML += `<div class="p-3 bg-slate-50 rounded-xl flex justify-between border">
                        <span>เลข <b>${b.number}</b></span>
                        <span>ยอด <b>${b.amount}</b> | <span class="text-slate-400">รอผล</span></span>
                    </div>`;
                });
            });
        }

        // --- ระบบแทงหวย ---
        async function placeBet() {
            const num = document.getElementById('lottery-num').value;
            const amount = parseFloat(document.getElementById('lottery-amount').value);

            if(!num || num.length > 2) return alert('กรุณาใส่เลข 2 ตัว');
            if(!amount || amount <= 0) return alert('กรุณาระบุจำนวนเงิน');
            if(amount > currentUser.balance) return alert('ยอดเงินไม่พอ กรุณาเติมเงินก่อนครับ');

            try {
                await db.collection("bets").add({
                    phone: currentUser.phone,
                    name: currentUser.name,
                    number: num,
                    amount: amount,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection("users").doc(currentUser.id).update({
                    balance: currentUser.balance - amount
                });
                alert('ส่งโพยสำเร็จ!');
                document.getElementById('lottery-num').value = '';
                document.getElementById('lottery-amount').value = '';
            } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
        }

        // --- ระบบฝาก-ถอน ---
        function openMoneyModal(type) {
            transType = type;
            document.getElementById('modal-title').innerText = type === 'deposit' ? 'แจ้งฝากเงิน' : 'แจ้งถอนเงิน';
            document.getElementById('money-modal').classList.remove('hidden');
        }
        function closeMoneyModal() { document.getElementById('money-modal').classList.add('hidden'); }

        async function submitTransaction() {
            const amount = parseFloat(document.getElementById('money-amount').value);
            if(!amount || amount <= 0) return alert('ใส่จำนวนเงินที่ถูกต้อง');

            try {
                await db.collection("transactions").add({
                    uid: currentUser.id,
                    user: currentUser.name,
                    phone: currentUser.phone,
                    amount: amount,
                    type: transType,
                    status: 'pending',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('ส่งคำขอสำเร็จ กรุณารอแอดมินอนุมัติ');
                closeMoneyModal();
                document.getElementById('money-amount').value = '';
            } catch (e) { alert('Error: ' + e.message); }
        }

        // --- ระบบ Admin ---
        function loadAdminData() {
            // ดึงคำขอเงิน
            db.collection("transactions").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('admin-money-list');
                list.innerHTML = snap.empty ? '<p class="text-xs text-slate-300 italic">ไม่มีรายการ</p>' : '';
                snap.forEach(d => {
                    const m = d.data();
                    list.innerHTML += `<div class="p-3 bg-slate-50 rounded-xl flex justify-between items-center text-xs border">
                        <div>
                            <p class="font-bold text-${m.type === 'deposit' ? 'green' : 'red'}-600 uppercase">${m.type}: ${m.amount}฿</p>
                            <p class="text-[10px] text-slate-400">${m.user} (${m.phone})</p>
                        </div>
                        ${m.status === 'pending' ? `<button onclick="approveTrans('${d.id}', '${m.uid}', ${m.amount}, '${m.type}')" class="bg-slate-900 text-white px-3 py-1.5 rounded-lg font-bold">อนุมัติ</button>` : `<span class="text-green-500 font-bold">สำเร็จ</span>`}
                    </div>`;
                });
            });

            // ดึงโพยหวย
            db.collection("bets").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('admin-bet-list');
                list.innerHTML = snap.empty ? '<p class="text-xs text-slate-300 italic">ไม่มีรายการ</p>' : '';
                snap.forEach(d => {
                    const b = d.data();
                    list.innerHTML += `<div class="p-2 border-b text-[11px] flex justify-between">
                        <span><b>${b.number}</b> = ${b.amount}฿</span>
                        <span class="text-slate-400">${b.name}</span>
                    </div>`;
                });
            });
        }

        async function approveTrans(id, uid, amount, type) {
            if(!confirm('ยืนยันรายการนี้?')) return;
            try {
                const userRef = db.collection("users").doc(uid);
                const userDoc = await userRef.get();
                if(userDoc.exists) {
                    const newBalance = type === 'deposit' ? userDoc.data().balance + amount : userDoc.data().balance - amount;
                    await userRef.update({ balance: newBalance });
                    await db.collection("transactions").doc(id).update({ status: 'success' });
                    alert('อนุมัติยอดเรียบร้อย');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        // เริ่มต้น Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
