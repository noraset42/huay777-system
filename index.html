<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUAY777 - All in One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, onSnapshot, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyA1kBPGS682alisAY_p-h4MaZjFa4L9QcU",
          authDomain: "huay777-4935b.firebaseapp.com",
          projectId: "huay777-4935b",
          storageBucket: "huay777-4935b.firebasestorage.app",
          appId: "1:202558801938:web:180872ca68864c6065f0cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db; 
        window.fb = { collection, addDoc, getDocs, query, where, serverTimestamp, onSnapshot, orderBy, doc, updateDoc };
    </script>

    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col">

    <!-- 1. หน้า Login -->
    <div id="login-page" class="page active p-8 pt-20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900">HUAY777</h1>
            <p class="text-slate-400 text-sm">เข้าสู่ระบบสมาชิก/แอดมิน</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="login-phone" placeholder="เบอร์โทรศัพท์" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-yellow-500">
            <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:border-yellow-500">
            <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg">เข้าสู่ระบบ</button>
            <button onclick="showPage('reg-page')" class="w-full text-slate-500 text-sm font-bold">ยังไม่มีบัญชี? สมัครสมาชิก</button>
        </div>
    </div>

    <!-- 2. หน้าสมัครสมาชิก -->
    <div id="reg-page" class="page p-8">
        <h2 class="text-2xl font-bold mb-6">สมัครสมาชิก</h2>
        <div class="space-y-3">
            <input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
            <input type="text" id="reg-phone" placeholder="เบอร์โทรศัพท์" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
            <select id="reg-bank" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                <option value="">เลือกธนาคาร</option>
                <option value="กสิกรไทย">กสิกรไทย</option>
                <option value="ไทยพาณิชย์">ไทยพาณิชย์</option>
                <option value="กรุงเทพ">กรุงเทพ</option>
                <option value="กรุงไทย">กรุงไทย</option>
            </select>
            <input type="text" id="reg-acc" placeholder="เลขบัญชีธนาคาร" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
            <input type="password" id="reg-pass" placeholder="รหัสผ่าน" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
            <button onclick="handleRegister()" class="w-full bg-yellow-500 text-slate-900 p-4 rounded-2xl font-bold shadow-lg mt-4">ยืนยันการสมัคร</button>
            <button onclick="showPage('login-page')" class="w-full text-slate-500 text-sm">ย้อนกลับ</button>
        </div>
    </div>

    <!-- 3. หน้าสำหรับ User ปกติ -->
    <div id="user-page" class="page h-full">
        <header class="bg-slate-900 text-white p-6 rounded-b-[2rem]">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center font-bold text-slate-900" id="user-initial">U</div>
                    <div>
                        <p class="text-[10px] opacity-60">Member Account</p>
                        <h1 class="text-sm font-bold" id="user-display-name">...</h1>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-slate-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
            <div class="bg-gradient-to-br from-yellow-400 to-yellow-600 p-5 rounded-2xl text-slate-900 shadow-lg">
                <p class="text-[10px] font-bold opacity-70 uppercase">Balance</p>
                <h2 class="text-3xl font-black">0.00 <span class="text-sm">฿</span></h2>
            </div>
        </header>
        <div class="p-6 text-center text-slate-400">
            <i data-lucide="info" class="mx-auto mb-2"></i>
            <p class="text-xs">หน้าแทงหวยจะเปิดรับยอดเร็วๆ นี้</p>
        </div>
    </div>

    <!-- 4. หน้าสำหรับ แอดมิน (เข้าได้เฉพาะเบอร์แอดมิน) -->
    <div id="admin-page" class="page p-6 bg-slate-50">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-red-600">ADMIN CONTROL</h1>
            <button onclick="location.reload()" class="text-slate-400"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </div>
        
        <div class="space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <h2 class="font-bold text-sm mb-3 text-slate-500">คำขอเงิน (Deposit/Withdraw)</h2>
                <div id="admin-money-list" class="space-y-2"></div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <h2 class="font-bold text-sm mb-3 text-slate-500">รายชื่อสมาชิก</h2>
                <div id="admin-user-list" class="space-y-2 text-xs"></div>
            </div>
        </div>
    </div>

    <script>
        // *** ตั้งค่าเบอร์แอดมินที่นี่ ***
        const ADMIN_PHONE = "0800000000";
        
        let currentUser = null;
        lucide.createIcons();

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;

            const q = window.fb.query(window.fb.collection(window.db, "users"), 
                window.fb.where("phone", "==", phone), 
                window.fb.where("pass", "==", pass)
            );

            const snap = await window.fb.getDocs(q);
            if (!snap.empty) {
                currentUser = snap.docs[0].data();
                
                // เช็คว่าเป็นแอดมินหรือไม่
                if(phone === ADMIN_PHONE) {
                    showPage('admin-page');
                    loadAdminData();
                } else {
                    document.getElementById('user-display-name').innerText = currentUser.name;
                    document.getElementById('user-initial').innerText = currentUser.name[0];
                    showPage('user-page');
                }
            } else {
                alert('เบอร์โทรศัพท์หรือรหัสผ่านไม่ถูกต้อง');
            }
        }

        async function handleRegister() {
            const user = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                bank: document.getElementById('reg-bank').value,
                acc: document.getElementById('reg-acc').value,
                pass: document.getElementById('reg-pass').value
            };
            if(!user.phone || !user.pass) return alert('กรุณากรอกข้อมูลให้ครบ');
            await window.fb.addDoc(window.fb.collection(window.db, "users"), { ...user, timestamp: window.fb.serverTimestamp() });
            alert('สมัครสมาชิกสำเร็จ!');
            showPage('login-page');
        }

        function loadAdminData() {
            // ดึงข้อมูลรายการเงิน
            window.fb.onSnapshot(window.fb.query(window.fb.collection(window.db, "transactions"), window.fb.orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('admin-money-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="p-3 border rounded-xl flex justify-between items-center text-sm">
                        <span>${data.user} (${data.type}) <b>${data.amount}฿</b></span>
                        ${data.status === 'pending' ? `<button onclick="approve('${d.id}')" class="bg-green-500 text-white px-2 py-1 rounded text-[10px]">อนุมัติ</button>` : `<span class="text-slate-400 text-[10px]">SUCCESS</span>`}
                    </div>`;
                });
            });
            // ดึงรายชื่อสมาชิก
            window.fb.onSnapshot(window.fb.collection(window.db, "users"), (snap) => {
                const list = document.getElementById('admin-user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    list.innerHTML += `<div class="p-2 bg-slate-50 rounded-lg border">${data.name} - ${data.phone} (${data.bank})</div>`;
                });
            });
        }

        async function approve(id) {
            await window.fb.updateDoc(window.fb.doc(window.db, "transactions", id), { status: "success" });
        }
    </script>
</body>
</html>
