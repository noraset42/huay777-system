<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUAY777 - Premium VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; }
        .gold-gradient { background: linear-gradient(135deg, #fde047 0%, #eab308 50%, #b45309 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .page { display: none; min-height: 100vh; }
        .page.active { display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #fde047; }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl overflow-x-hidden">

    <!-- LOGIN PAGE -->
    <div id="login-page" class="page active justify-center p-8">
        <div class="text-center mb-12">
            <div class="inline-block p-4 rounded-3xl bg-yellow-500 mb-4 shadow-[0_0_30px_rgba(234,179,8,0.3)]">
                <i data-lucide="clover" class="w-12 h-12 text-slate-900"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter">HUAY<span class="text-yellow-500">777</span></h1>
            <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest">The Best Betting Experience</p>
        </div>
        
        <div class="space-y-4">
            <div class="glass p-1 rounded-2xl">
                <input type="text" id="login-phone" placeholder="เบอร์โทรศัพท์" class="w-full bg-transparent p-4 outline-none">
            </div>
            <div class="glass p-1 rounded-2xl">
                <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="w-full bg-transparent p-4 outline-none">
            </div>
            <button onclick="handleLogin()" id="btn-login" class="gold-gradient w-full p-4 rounded-2xl font-bold text-slate-900 shadow-lg active:scale-95 transition">เข้าสู่ระบบ</button>
            <button onclick="showPage('reg-page')" class="w-full text-slate-400 text-sm font-bold">ยังไม่เป็นสมาชิก? <span class="text-yellow-500">สมัครเลย</span></button>
        </div>
    </div>

    <!-- REGISTER PAGE -->
    <div id="reg-page" class="page p-6">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="showPage('login-page')" class="p-2 glass rounded-xl"><i data-lucide="chevron-left"></i></button>
            <h2 class="text-2xl font-bold">สมัครสมาชิก VIP</h2>
        </div>
        <div class="space-y-4">
            <div class="glass p-1 rounded-xl"><input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล" class="w-full bg-transparent p-4 outline-none"></div>
            <div class="glass p-1 rounded-xl"><input type="text" id="reg-phone" placeholder="เบอร์โทรศัพท์" class="w-full bg-transparent p-4 outline-none"></div>
            <div class="grid grid-cols-2 gap-2">
                <div class="glass p-1 rounded-xl">
                    <select id="reg-bank" class="w-full bg-slate-800 p-4 outline-none rounded-xl text-sm">
                        <option>กสิกร</option><option>ไทยพาณิชย์</option><option>กรุงไทย</option>
                    </select>
                </div>
                <div class="glass p-1 rounded-xl"><input type="text" id="reg-acc" placeholder="เลขบัญชี" class="w-full bg-transparent p-4 outline-none"></div>
            </div>
            <div class="glass p-1 rounded-xl"><input type="password" id="reg-pass" placeholder="ตั้งรหัสผ่าน" class="w-full bg-transparent p-4 outline-none"></div>
            <button onclick="handleRegister()" id="btn-reg" class="gold-gradient w-full p-4 rounded-2xl font-bold text-slate-900 mt-6 active:scale-95 transition">ยืนยันการสมัคร</button>
        </div>
        <p id="reg-msg" class="text-center mt-4 text-xs text-yellow-500 font-bold"></p>
    </div>

    <!-- MAIN APP PAGE -->
    <div id="main-page" class="page">
        <!-- Header -->
        <div class="p-6 flex justify-between items-center bg-slate-900/50 sticky top-0 z-10 backdrop-blur-md">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 gold-gradient rounded-full"></div>
                <span id="user-name" class="font-bold text-sm">...</span>
            </div>
            <div class="glass px-4 py-1 rounded-full border-yellow-500/50">
                <span class="text-[10px] text-yellow-500 font-bold">ยอดเงิน</span>
                <span id="user-balance" class="ml-2 font-black">0.00</span>
            </div>
        </div>

        <!-- Content (Betting) -->
        <div class="p-6 space-y-6">
            <div class="gold-gradient p-6 rounded-[2rem] text-slate-900 flex justify-between items-center shadow-[0_10px_30px_rgba(234,179,8,0.2)]">
                <div>
                    <h3 class="text-sm font-bold opacity-80">หวยรัฐบาลไทย</h3>
                    <p class="text-2xl font-black">งวดปัจจุบัน</p>
                </div>
                <i data-lucide="ticket" class="w-12 h-12 opacity-30"></i>
            </div>

            <div class="glass p-6 rounded-[2rem] space-y-4">
                <h4 class="text-center font-bold text-yellow-500 uppercase tracking-widest text-xs">ระบุเลขที่ต้องการแทง</h4>
                <div class="flex gap-4">
                    <input type="number" id="bet-num" placeholder="00" class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 text-center text-4xl font-black outline-none focus:border-yellow-500">
                    <input type="number" id="bet-price" placeholder="บาท" class="flex-1 bg-white/5 p-4 rounded-2xl border border-white/10 text-center text-xl font-bold outline-none focus:border-yellow-500">
                </div>
                <button onclick="sendBet()" class="w-full bg-white text-slate-900 p-4 rounded-2xl font-black active:scale-95 transition">แทงทันที</button>
            </div>

            <div>
                <h4 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4"></i> ประวัติการเล่น</h4>
                <div id="bet-list" class="space-y-2">
                    <!-- ประวัติจะมาโผล่ตรงนี้ -->
                </div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <div class="mt-auto glass flex justify-around p-4 sticky bottom-0 border-t border-white/10">
            <button class="nav-btn active text-xs flex flex-col items-center gap-1"><i data-lucide="home"></i> หน้าแรก</button>
            <button onclick="openMoney('deposit')" class="nav-btn text-xs flex flex-col items-center gap-1 text-slate-400"><i data-lucide="plus-circle"></i> ฝากเงิน</button>
            <button onclick="openMoney('withdraw')" class="nav-btn text-xs flex flex-col items-center gap-1 text-slate-400"><i data-lucide="minus-circle"></i> ถอนเงิน</button>
            <button onclick="location.reload()" class="nav-btn text-xs flex flex-col items-center gap-1 text-red-400"><i data-lucide="log-out"></i> ออก</button>
        </div>
    </div>

    <!-- Admin Page -->
    <div id="admin-page" class="page p-6 bg-slate-950">
        <h1 class="text-2xl font-black text-yellow-500 mb-6">ADMIN PANEL</h1>
        <div class="space-y-6">
            <div class="glass p-4 rounded-2xl">
                <h3 class="font-bold text-green-400 text-sm mb-4 uppercase">รายการแจ้งฝาก-ถอน</h3>
                <div id="admin-trans" class="space-y-2"></div>
            </div>
            <div class="glass p-4 rounded-2xl">
                <h3 class="font-bold text-yellow-400 text-sm mb-4 uppercase">โพยหวยทั้งหมด</h3>
                <div id="admin-bets" class="space-y-2"></div>
            </div>
        </div>
        <button onclick="location.reload()" class="mt-8 text-slate-500 text-xs uppercase font-bold tracking-widest underline w-full">ปิดระบบแอดมิน</button>
    </div>

    <script>
        const ADMIN_PHONE = "0800000000"; // เปลี่ยนเป็นเบอร์คุณ

        const firebaseConfig = {
            apiKey: "AIzaSyA1kBPGS682alisAY_p-h4MaZjFa4L9QcU",
            authDomain: "huay777-4935b.firebaseapp.com",
            projectId: "huay777-4935b",
            storageBucket: "huay777-4935b.firebasestorage.app",
            appId: "1:202558801938:web:180872ca68864c6065f0cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.settings({ experimentalForceLongPolling: true }); // ตัวแก้เน็ตบริษัท

        let user = null;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            lucide.createIcons();
        }

        async function handleRegister() {
            const btn = document.getElementById('btn-reg');
            const data = {
                name: document.getElementById('reg-name').value,
                phone: document.getElementById('reg-phone').value,
                bank: document.getElementById('reg-bank').value,
                acc: document.getElementById('reg-acc').value,
                pass: document.getElementById('reg-pass').value,
                balance: 0
            };
            if(!data.phone || !data.pass) return alert("กรอกข้อมูลไม่ครบ");
            
            btn.innerText = "กำลังสมัคร..."; btn.disabled = true;
            try {
                await db.collection("users").add(data);
                alert("สมัครเรียบร้อย!"); showPage('login-page');
            } catch(e) { alert("ล้มเหลว: "+e.message); }
            btn.innerText = "ยืนยันการสมัคร"; btn.disabled = false;
        }

        async function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            try {
                const snap = await db.collection("users").where("phone","==",phone).where("pass","==",pass).get();
                if(!snap.empty) {
                    user = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    if(phone === ADMIN_PHONE) { showPage('admin-page'); loadAdmin(); }
                    else { showPage('main-page'); startSync(); }
                } else { alert("เบอร์หรือรหัสผ่านผิด"); }
            } catch(e) { alert("เชื่อมต่อฐานข้อมูลไม่ได้"); }
        }

        function startSync() {
            db.collection("users").doc(user.id).onSnapshot(doc => {
                const d = doc.data();
                document.getElementById('user-name').innerText = d.name;
                document.getElementById('user-balance').innerText = d.balance.toLocaleString();
                user.balance = d.balance;
            });
            db.collection("bets").where("phone","==",user.phone).onSnapshot(snap => {
                const list = document.getElementById('bet-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const b = d.data();
                    list.innerHTML += `<div class="glass p-3 rounded-xl flex justify-between text-xs"><span>เลข ${b.num}</span><span class="text-yellow-500 font-bold">${b.price}฿</span></div>`;
                });
            });
        }

        async function sendBet() {
            const num = document.getElementById('bet-num').value;
            const price = parseFloat(document.getElementById('bet-price').value);
            if(!num || !price || price > user.balance) return alert("ยอดเงินไม่พอหรือกรอกไม่ครบ");
            
            await db.collection("bets").add({ phone: user.phone, name: user.name, num, price });
            await db.collection("users").doc(user.id).update({ balance: user.balance - price });
            alert("ส่งโพยสำเร็จ!");
        }

        function openMoney(type) {
            const amt = prompt("ระบุจำนวนเงินที่ต้องการ " + (type === 'deposit' ? 'ฝาก' : 'ถอน'));
            if(amt) {
                db.collection("trans").add({ name: user.name, phone: user.phone, uid: user.id, type, amt: parseFloat(amt), status: 'pending' });
                alert("ส่งเรื่องให้แอดมินแล้ว");
            }
        }

        function loadAdmin() {
            db.collection("trans").onSnapshot(snap => {
                const list = document.getElementById('admin-trans');
                list.innerHTML = "";
                snap.forEach(d => {
                    const t = d.data();
                    if(t.status === 'pending') {
                        list.innerHTML += `<div class="p-2 border-b border-white/5 flex justify-between text-[10px]"><span>${t.name} ${t.type} ${t.amt}</span><button onclick="approve('${d.id}','${t.uid}',${t.amt},'${t.type}')" class="text-green-400 font-bold">[อนุมัติ]</button></div>`;
                    }
                });
            });
        }

        async function approve(tid, uid, amt, type) {
            const uref = db.collection("users").doc(uid);
            const udoc = await uref.get();
            const newBal = type === 'deposit' ? udoc.data().balance + amt : udoc.data().balance - amt;
            await uref.update({ balance: newBal });
            await db.collection("trans").doc(tid).update({ status: 'done' });
            alert("สำเร็จ");
        }

        lucide.createIcons();
    </script>
</body>
</html>
